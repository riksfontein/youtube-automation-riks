name: Stage 3 — Document Generation

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel (AE, GIA, or BF)'
        required: true
        type: choice
        options: [AE, GIA, BF]
      job_id:
        description: 'Job ID from Checkpoint 2 email'
        required: true
      action:
        description: 'Action: approve or regenerate'
        required: true
        default: 'approve'
        type: choice
        options: [approve, regenerate]

jobs:
  generate_documents:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Stage 3 Document Generation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID_AE: ${{ secrets.ELEVENLABS_VOICE_ID_AE }}
          ELEVENLABS_VOICE_ID_GIA: ${{ secrets.ELEVENLABS_VOICE_ID_GIA }}
          ELEVENLABS_VOICE_ID_BF: ${{ secrets.ELEVENLABS_VOICE_ID_BF }}
          SUBSCRIBR_API_KEY: ${{ secrets.SUBSCRIBR_API_KEY }}
          SUBSCRIBR_CHANNEL_ID_AE: ${{ secrets.SUBSCRIBR_CHANNEL_ID_AE }}
          SUBSCRIBR_CHANNEL_ID_GIA: ${{ secrets.SUBSCRIBR_CHANNEL_ID_GIA }}
          SUBSCRIBR_CHANNEL_ID_BF: ${{ secrets.SUBSCRIBR_CHANNEL_ID_BF }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_AE: ${{ secrets.YOUTUBE_REFRESH_TOKEN_AE }}
          YOUTUBE_REFRESH_TOKEN_GIA: ${{ secrets.YOUTUBE_REFRESH_TOKEN_GIA }}
          YOUTUBE_REFRESH_TOKEN_BF: ${{ secrets.YOUTUBE_REFRESH_TOKEN_BF }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          CHANNEL: ${{ github.event.inputs.channel }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          ACTION: ${{ github.event.inputs.action }}
        run: python src/main.py --stage 3 --channel $CHANNEL --job-id $JOB_ID --action $ACTION


      - name: Generate dashboard
        run: python src/generate_dashboard.py
        continue-on-error: true
      - name: Commit state updates
        run: |
          git config --global user.email "automation@croki.store"
          git config --global user.name "YouTube Automation"
          git add state.json docs/index.html
          git diff --staged --quiet || git commit -m "Stage 3 complete: ${{ github.event.inputs.channel }} documents"
          git push https://x-access-token:${{ secrets.GITHUB_PAT }}@github.com/${{ github.repository }}.git HEAD:main
