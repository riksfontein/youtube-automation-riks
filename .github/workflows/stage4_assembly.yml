name: Stage 4 — Assembly & YouTube Upload

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel (AE, GIA, or BF)'
        required: true
        type: choice
        options: [AE, GIA, BF]
      job_id:
        description: 'Job ID from documents email'
        required: true
      drive_folder_url:
        description: 'Google Drive folder URL containing your images and videos'
        required: true

jobs:
  assemble_and_upload:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      - name: Install fonts for captions
        run: |
          sudo apt-get install -y fonts-dejavu fontconfig
          mkdir -p ~/.fonts
          wget -q "https://github.com/dharmatype/Bebas-Neue/raw/master/fonts/BNbold.ttf" \
               -O ~/.fonts/BebasNeue-Regular.ttf 2>/dev/null || true
          fc-cache -fv
          echo "Fonts ready"

      - name: Run Stage 4 Assembly
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          SUBSCRIBR_API_KEY: ${{ secrets.SUBSCRIBR_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL: ${{ secrets.RESEND_TO_EMAIL }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_AE: ${{ secrets.YOUTUBE_REFRESH_TOKEN_AE }}
          YOUTUBE_REFRESH_TOKEN_GIA: ${{ secrets.YOUTUBE_REFRESH_TOKEN_GIA }}
          YOUTUBE_REFRESH_TOKEN_BF: ${{ secrets.YOUTUBE_REFRESH_TOKEN_BF }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_PAT }}
          GITHUB_REPO: ${{ github.repository }}
          CHANNEL: ${{ github.event.inputs.channel }}
          JOB_ID: ${{ github.event.inputs.job_id }}
          DRIVE_FOLDER_URL: ${{ github.event.inputs.drive_folder_url }}
        run: python src/main.py --stage 4 --channel $CHANNEL --job-id $JOB_ID --drive-folder "$DRIVE_FOLDER_URL"

      - name: Commit state updates
        run: |
          git config --global user.email "automation@croki.store"
          git config --global user.name "YouTube Automation"
          git add state.json
          git diff --staged --quiet || git commit -m "Stage 4 complete: ${{ github.event.inputs.channel }} uploaded"
          git push
