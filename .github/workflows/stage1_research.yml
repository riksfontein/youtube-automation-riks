name: Stage 1 — Research & Competitor Selection

on:
  schedule:
    - cron: '0 6 * * 1'
    - cron: '0 6 * * 2'
    - cron: '0 6 * * 3'
    - cron: '0 6 * * 5'
    - cron: '0 6 * * 6'
    - cron: '0 6 * * 0'

  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel to run (AE, GIA, or BF)'
        required: true
        default: 'AE'
        type: choice
        options: [AE, GIA, BF]

jobs:
  research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine channel from schedule
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "channel=${{ github.event.inputs.channel }}" >> $GITHUB_OUTPUT
          else
            DAY=$(date +%u)
            case $DAY in
              1|5) echo "channel=AE"  >> $GITHUB_OUTPUT ;;
              2|6) echo "channel=GIA" >> $GITHUB_OUTPUT ;;
              3|7) echo "channel=BF"  >> $GITHUB_OUTPUT ;;
              *)   echo "channel=AE"  >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Run Stage 1 Research
        env:
          ANTHROPIC_API_KEY:         ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:        ${{ secrets.ELEVENLABS_API_KEY }}
          SUBSCRIBR_API_KEY:         ${{ secrets.SUBSCRIBR_API_KEY }}
          VIDIQ_API_KEY:             ${{ secrets.VIDIQ_API_KEY }}
          RESEND_API_KEY:            ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL:         ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_TO_EMAIL:           ${{ secrets.RESEND_TO_EMAIL }}
          YOUTUBE_CLIENT_ID:         ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:     ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN_AE:  ${{ secrets.YOUTUBE_REFRESH_TOKEN_AE }}
          YOUTUBE_REFRESH_TOKEN_GIA: ${{ secrets.YOUTUBE_REFRESH_TOKEN_GIA }}
          YOUTUBE_REFRESH_TOKEN_BF:  ${{ secrets.YOUTUBE_REFRESH_TOKEN_BF }}
          GOOGLE_DRIVE_FOLDER_ID:    ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
          GITHUB_REPO:               ${{ github.repository }}
          CHANNEL:                   ${{ steps.channel.outputs.channel }}
        run: python src/main.py --stage 1 --channel $CHANNEL

      - name: Generate dashboard
        run: python src/generate_dashboard.py
        continue-on-error: true

      - name: Commit and push changes
        env:
          GH_PAT: ${{ secrets.GITHUB_PAT }}
        run: |
          git config user.email "automation@croki.store"
          git config user.name "YouTube Automation"
          if [ -n "${GH_PAT}" ]; then
            git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git"
          fi
          git add state.json
          git add docs/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Automation update"
          git push origin HEAD:main || echo "Push skipped (no PAT or nothing to push)"
